{% extends "base.html" %}

{% block titulo %}Procesos{% endblock %}
{% block page_title %}Procesos{% endblock %}

{% block contenido %}
<div class="page-header">
    <h2>Procesos</h2>
    <a href="{% url 'inventario:proceso_crear' %}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo Proceso</a>
</div>

<div class="card border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th style="width:160px">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in procesos %}
                    <tr>
                        <td class="fw-semibold">{{ p.nombre }}</td>
                        <td>
                            <a href="{% url 'inventario:proceso_editar' p.pk %}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
                            <a href="{% url 'inventario:proceso_eliminar' p.pk %}" class="btn btn-sm btn-danger"><i class="bi bi-trash3"></i></a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="2" class="text-center text-muted py-4">No hay procesos registrados.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
