{% extends "base.html" %}

{% block titulo %}Quitar Material{% endblock %}
{% block page_title %}Quitar Material{% endblock %}

{% block contenido %}
<div class="confirm-card mx-auto">
    <div class="confirm-card-body">
        <div class="confirm-icon"><i class="bi bi-exclamation-triangle"></i></div>
        <h4>Quitar material</h4>
        <p>¿Quitar <strong>{{ consumo.material.nombre }}</strong> de la referencia <strong>{{ consumo.referencia.codigo }}</strong>?</p>
    </div>
    <div class="confirm-card-actions">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash3 me-1"></i>Quitar</button>
        </form>
        <a href="{% url 'inventario:referencia_detalle' consumo.referencia.pk %}" class="btn btn-secondary">Cancelar</a>
    </div>
</div>
{% endblock %}
