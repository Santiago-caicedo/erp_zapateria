{% extends "base.html" %}

{% block titulo %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block contenido %}
<div class="form-card mx-auto">
    <div class="form-card-header">
        <h2>{{ titulo }}</h2>
        <p>Define la categoría del material.</p>
    </div>
    <div class="form-card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_nombre">Nombre</label>
                <input type="text" name="nombre" id="id_nombre"
                       value="{{ form.nombre.value|default:'' }}"
                       class="form-control {% if form.nombre.errors %}is-invalid{% endif %}"
                       placeholder="Ej: Capellada, Forro, Suela..." required>
                {% if form.nombre.errors %}<div class="invalid-feedback">{{ form.nombre.errors.0 }}</div>{% endif %}
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Guardar</button>
                <a href="{% url 'inventario:tipo_material_lista' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
